services:
  app:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    env_file:
      - .env
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.shaheen.rule=Host(`alshaheenai.com`)"
      - "traefik.http.routers.shaheen.entrypoints=websecure"
      - "traefik.http.routers.shaheen.tls.certresolver=myresolver"
      - "traefik.http.routers.shaheen.service=shaheen"
      - "traefik.http.services.shaheen.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
